<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labirints 3D</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    #c { display: block; width: 100vw; height: 100vh; }
    /* Оверлей старта — pointer lock требует user-gesture (click). */
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(8,10,14,0.86); color: #cdd6e0;
      font-family: monospace; text-align: center; cursor: pointer; z-index: 10;
    }
    #overlay h1 { color: #4ec9ff; font-size: 34px; margin: 0 0 12px; letter-spacing: 2px; }
    #overlay p  { margin: 4px 0; font-size: 15px; color: #8a93a0; }
    #overlay .go { margin-top: 22px; font-size: 18px; color: #ffd54f; }
    #crosshair {
      position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
      transform: translate(-50%,-50%); pointer-events: none; z-index: 5; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.7);
    }
    #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
    #crosshair::after  { top: 8px; left: 0; height: 2px; width: 18px; }
    #hud {
      position: fixed; left: 14px; top: 12px; z-index: 5; display: none;
      font-family: monospace; font-size: 20px; color: #ff5252;
      text-shadow: 0 0 4px #000; pointer-events: none;
    }
    #killcnt { color: #cdd6e0; font-size: 15px; margin-left: 16px; }
    #weap { font-size: 15px; color: #ffd54f; margin-top: 6px; }
    #weap #bombCount { color: #cdd6e0; }
    /* красная вспышка при получении урона */
    #flash {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(255,0,0,0) 40%, rgba(255,0,0,0.55) 100%);
      opacity: 0; transition: opacity 0.12s ease-out;
    }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="crosshair"></div>
  <div id="hud">
    HP: <span id="hp">♥♥♥</span><span id="killcnt"></span>
    <div id="weap">🚀 <span id="rocketState">готова</span> · 💣 <span id="bombCount">5</span></div>
  </div>
  <div id="flash"></div>
  <div id="overlay">
    <h1>LABIRINTS 3D</h1>
    <p>WASD — движение · Мышь — обзор · Shift — спринт</p>
    <p>ЛКМ — стрельба · Esc — освободить курсор</p>
    <p class="go">Кликни, чтобы войти</p>
  </div>
  <script type="module" src="./src/three/main3d.js?v=3d3"></script>
</body>
</html>
