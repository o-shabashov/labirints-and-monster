<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Labirints 3D</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
    #c { display: block; width: 100vw; height: 100vh; }
    /* Оверлей старта — pointer lock требует user-gesture (click). */
    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(8,10,14,0.86); color: #cdd6e0;
      font-family: monospace; text-align: center; cursor: pointer; z-index: 10;
    }
    #overlay h1 { color: #4ec9ff; font-size: 34px; margin: 0 0 12px; letter-spacing: 2px; }
    #overlay p  { margin: 4px 0; font-size: 15px; color: #8a93a0; }
    #overlay .go { margin-top: 22px; font-size: 18px; color: #ffd54f; }
    #crosshair {
      position: fixed; left: 50%; top: 50%; width: 18px; height: 18px;
      transform: translate(-50%,-50%); pointer-events: none; z-index: 5; display: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.7);
    }
    #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
    #crosshair::after  { top: 8px; left: 0; height: 2px; width: 18px; }
    #hud {
      position: fixed; left: 14px; top: 12px; z-index: 5; display: none;
      font-family: monospace; font-size: 20px; color: #ff5252;
      text-shadow: 0 0 4px #000; pointer-events: none;
    }
    #killcnt { color: #cdd6e0; font-size: 15px; margin-left: 16px; }
    #lvl { color: #ffd54f; font-size: 15px; margin-left: 16px; }
    #weap { font-size: 15px; color: #ffd54f; margin-top: 6px; }
    #weap #bombCount { color: #cdd6e0; }
    #weap #diff { color: #aaaaaa; }
    /* красная вспышка при получении урона */
    #flash {
      position: fixed; inset: 0; z-index: 4; pointer-events: none;
      background: radial-gradient(ellipse at center, rgba(255,0,0,0) 40%, rgba(255,0,0,0.55) 100%);
      opacity: 0; transition: opacity 0.12s ease-out;
    }
    /* viewmodel — посох, привязан снизу-справа, бобает через --bob */
    #viewmodel {
      position: fixed; right: 16%; bottom: -2%; z-index: 5; display: none;
      pointer-events: none; transform: translateY(var(--bob, 0px)) translateY(var(--recoil, 0px));
    }
    #staff {
      width: 26px; height: 340px; border-radius: 13px;
      background: linear-gradient(90deg, #5a3a22, #7a5230 45%, #3a2616);
      transform: rotate(18deg); transform-origin: bottom center;
      box-shadow: -6px 0 12px rgba(0,0,0,0.5);
      position: relative;
    }
    #stafftip {
      position: absolute; top: -26px; left: 50%; width: 46px; height: 46px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: radial-gradient(circle, #fff2c0 0%, #ffaa33 45%, rgba(255,120,0,0) 75%);
      animation: tipPulse 1.6s ease-in-out infinite;
    }
    @keyframes tipPulse {
      0%,100% { opacity: 0.75; transform: translateX(-50%) scale(0.9); }
      50%     { opacity: 1;    transform: translateX(-50%) scale(1.15); }
    }
    /* компас — указывает на выход относительно взгляда */
    #compass {
      position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 5; display: none; text-align: center;
      font-family: monospace; color: #ffd54f; opacity: 0.7;
      pointer-events: none; text-shadow: 0 0 4px #000;
    }
    #compassArrow { display: inline-block; font-size: 26px; transition: transform 0.08s linear; }
    #compassDist { display: block; font-size: 12px; color: #cdd6e0; margin-top: -2px; }
    /* вводная подсказка — плавно гаснет */
    #introhint {
      position: fixed; bottom: 16%; left: 50%; transform: translateX(-50%);
      z-index: 5; display: none; max-width: 60%; text-align: center;
      font-family: monospace; font-size: 16px; color: #e8eef6;
      background: rgba(8,10,14,0.6); padding: 10px 18px; border-radius: 8px;
      text-shadow: 0 0 3px #000; transition: opacity 1s ease-out;
    }
    #introhint b { color: #ffd54f; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="crosshair"></div>
  <!-- компас к выходу + вводная подсказка -->
  <div id="compass"><span id="compassArrow">⬆</span><span id="compassDist"></span></div>
  <div id="introhint">Найди светящийся <b>жёлтый выход</b> · ЛКМ — стрелять · подбери <b>ракетницу</b> и <b>бомбы</b></div>
  <div id="hud">
    HP: <span id="hp">♥♥♥</span><span id="killcnt"></span><span id="lvl"></span>
    <div id="weap">🚀 <span id="rocketState">нет</span> · 💣 <span id="bombCount">0</span> · <span id="diff">Сложность ×1.0</span></div>
  </div>
  <div id="flash"></div>
  <!-- viewmodel: посох мага снизу-справа (игрок — wizard) -->
  <div id="viewmodel">
    <div id="staff"><div id="stafftip"></div></div>
  </div>
  <div id="overlay">
    <h1>LABIRINTS 3D</h1>
    <p>WASD — движение · Мышь — обзор · Shift — спринт</p>
    <p>ЛКМ — стрельба · Esc — освободить курсор</p>
    <p class="go">Кликни, чтобы войти</p>
  </div>
  <script type="module" src="./src/three/main3d.js?v=3d9"></script>
</body>
</html>
